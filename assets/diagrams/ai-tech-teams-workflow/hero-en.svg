<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">How I built autonomous AI engineering teams</title>
  <desc id="desc">An engineering system for autonomous AI teams: task batches, independent roles, QA, audit and mechanical gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1113"/>
      <stop offset="0.52" stop-color="#121815"/>
      <stop offset="1" stop-color="#1b1712"/>
    </linearGradient>
    <radialGradient id="quietGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.55" stop-color="#f5b83d"/>
      <stop offset="1" stop-color="#ff6b5f"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c7bfae"/>
    </marker>
    <style>
      .title { font: 850 78px Arial, Helvetica, sans-serif; fill: #f7f3e8; }
      .subtitle { font: 400 31px Arial, Helvetica, sans-serif; fill: #cfc7b6; }
      .eyebrow { font: 800 19px Arial, Helvetica, sans-serif; fill: #101113; }
      .section { font: 800 28px Arial, Helvetica, sans-serif; fill: #f7f3e8; }
      .label { font: 800 24px Arial, Helvetica, sans-serif; fill: #f7f3e8; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #c7bfae; }
      .metric { font: 850 44px Arial, Helvetica, sans-serif; fill: #f7f3e8; }
      .metricLabel { font: 400 15px Arial, Helvetica, sans-serif; fill: #c7bfae; }
      .card { fill: #171a18; stroke: #3d4038; stroke-width: 1.4; rx: 8; }
      .node { fill: #141716; stroke: #474a40; stroke-width: 1.4; rx: 8; }
      .grid { stroke: #2b302d; stroke-width: 1; opacity: 0.32; }
      .flow { stroke: #c7bfae; stroke-width: 2.8; fill: none; opacity: 0.78; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1350" cy="530" r="620" fill="url(#quietGlow)"/>

  <g opacity="0.55">
    <path class="grid" d="M92 178H1828"/>
    <path class="grid" d="M92 902H1828"/>
    <path class="grid" d="M92 178V902"/>
    <path class="grid" d="M1828 178V902"/>
    <path class="grid" d="M92 540H1828"/>
    <path class="grid" d="M526 178V902"/>
    <path class="grid" d="M960 178V902"/>
    <path class="grid" d="M1394 178V902"/>
  </g>

  <rect x="92" y="72" width="420" height="42" rx="8" fill="#2dd4bf"/>
  <text class="eyebrow" x="120" y="100">ENGINEERING SYSTEM FOR AI WORK</text>

  <text class="title" x="92" y="216">HOW I BUILT</text>
  <text class="title" x="92" y="314">AUTONOMOUS AI</text>
  <text class="title" x="92" y="412">ENGINEERING TEAMS</text>

  <text class="subtitle" x="96" y="482">Not one prompt and not one agent,</text>
  <text class="subtitle" x="96" y="528">but an operating system of roles, checks,</text>
  <text class="subtitle" x="96" y="574">isolated environments and feedback.</text>

  <path d="M96 638H780" stroke="url(#line)" stroke-width="7" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect class="card" x="92" y="700" width="220" height="110"/>
    <text class="metric" x="122" y="760">93</text>
    <text class="metricLabel" x="124" y="790">retrospectives</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="card" x="336" y="700" width="220" height="110"/>
    <text class="metric" x="366" y="760">15</text>
    <text class="metricLabel" x="368" y="790">ledger entries</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="card" x="580" y="700" width="240" height="110"/>
    <text class="metric" x="610" y="760">1.4</text>
    <text class="metricLabel" x="612" y="790">average QA rounds</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="164" width="680" height="650" rx="8" fill="#141716" stroke="#3e433a" stroke-width="1.6"/>
    <text class="section" x="1060" y="224">Operating loop</text>
    <text class="small" x="1060" y="258">a task batch reaches staging-verified through verifiable artifacts</text>

    <g>
      <rect class="node" x="1060" y="318" width="180" height="86"/>
      <circle cx="1094" cy="361" r="13" fill="#2dd4bf"/>
      <text class="label" x="1120" y="354">Plan</text>
      <text class="small" x="1120" y="382">slice + AC</text>

      <rect class="node" x="1328" y="318" width="180" height="86"/>
      <circle cx="1362" cy="361" r="13" fill="#f5b83d"/>
      <text class="label" x="1388" y="354">Code</text>
      <text class="small" x="1388" y="382">PR + CI</text>

      <rect class="node" x="1060" y="500" width="180" height="86"/>
      <circle cx="1094" cy="543" r="13" fill="#ff6b5f"/>
      <text class="label" x="1120" y="536">QA</text>
      <text class="small" x="1120" y="564">verdict.json</text>

      <rect class="node" x="1328" y="500" width="180" height="86"/>
      <circle cx="1362" cy="543" r="13" fill="#a7e35b"/>
      <text class="label" x="1388" y="536">Audit</text>
      <text class="small" x="1388" y="564">qa-review.json</text>

      <rect class="node" x="1194" y="654" width="226" height="86" stroke="#2dd4bf"/>
      <circle cx="1228" cy="697" r="13" fill="#2dd4bf"/>
      <text class="label" x="1254" y="690">Gate</text>
      <text class="small" x="1254" y="718">mechanical check</text>

      <path class="flow" d="M1248 361H1318"/>
      <path class="flow" d="M1418 414C1418 450 1418 464 1418 490"/>
      <path class="flow" d="M1320 543H1250"/>
      <path class="flow" d="M1150 586C1150 630 1170 666 1186 686"/>
      <path class="flow" d="M1418 586C1418 630 1396 666 1426 686"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1030" y="850" width="640" height="82" rx="8" fill="#101113" stroke="#2dd4bf" stroke-width="1.6"/>
    <text class="label" x="1070" y="901">Core principle:</text>
    <text class="small" x="1260" y="901" style="font-size:16px">artifacts prove readiness, not the model's confident tone</text>
  </g>
</svg>
