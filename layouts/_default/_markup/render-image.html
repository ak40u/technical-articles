{{- $src := .Destination -}}
{{- with .Page.Resources.GetMatch .Destination -}}
  {{- $src = .RelPermalink -}}
{{- end -}}
{{- $alt := .Text | plainify -}}
{{- $isDiagram := strings.HasSuffix (lower .Destination) ".svg" -}}

{{- if $isDiagram -}}
<figure class="diagram">
  <a class="diagram-link" href="{{ $src | safeURL }}" target="_blank" rel="noopener noreferrer" aria-label="{{ i18n "open_diagram_aria" (dict "Alt" $alt) }}">
    <img src="{{ $src | safeURL }}" alt="{{ $alt }}" loading="lazy" decoding="async">
    <span class="diagram-action" aria-hidden="true">{{ i18n "open_diagram" }}</span>
  </a>
  {{- with .Title }}<figcaption>{{ . }}</figcaption>{{ end -}}
</figure>
{{- else -}}
<img src="{{ $src | safeURL }}" alt="{{ $alt }}" loading="lazy" decoding="async"{{ with .Title }} title="{{ . }}"{{ end }}>
{{- end -}}
